name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: 980825417032.dkr.ecr.ap-northeast-1.amazonaws.com
  ECR_REPOSITORY: docker-aws/server
  ECS_CLUSTER: blushing-shark-7g11h7
  ECS_SERVICE: docker-aws-server

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Mirrors: aws ecr get-login-password | docker login
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # Mirrors: docker build -t docker-aws/server .
      - name: Build Docker image
        run: docker build -t $ECR_REPOSITORY .

      # Mirrors: docker tag docker-aws/server:latest 980825417032.dkr.ecr...
      - name: Tag Docker image
        run: docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Mirrors: docker push 980825417032.dkr.ecr...
      - name: Push to ECR
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Tells ECS to pick up the new image
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION